version: "3.9"

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tabinvest_app
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - /var/www/tabinvestproject.ru/frontend/uploads:/var/www/tabinvestproject.ru/frontend/uploads
